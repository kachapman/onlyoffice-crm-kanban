# HISTORICAL — used for estimate-nginx / sherwood-toolbox era (pre-2026-07).
# For dashboard.publicadjustermidwest.com the authoritative file is now
# the host nginx site: /etc/nginx/sites-enabled/dashboard.publicadjustermidwest.com
#
# Install on the droplet as:
#   /etc/nginx/sites-available/dashboard.vanguardadj.com
#   sudo ln -s /etc/nginx/sites-available/dashboard.vanguardadj.com /etc/nginx/sites-enabled/
# Replace YOUR_DROPLET_IP if using a floating IP literal in DNS.

server {
    listen 80;
    listen [::]:80;
    server_name dashboard.vanguardadj.com;

    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}