<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vanguard Adjusting Dashboard</title>
  <meta name="description" content="CRM Viewer and organizer for Opportunities, Notifications and Tasks." />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="favicon-192.png" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Vanguard Adjusting Dashboard" />
  <meta property="og:description" content="CRM Viewer and organizer for Opportunities, Notifications and Tasks." />
  <meta property="og:image" content="favicon-192.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Vanguard Adjusting Dashboard" />
  <meta name="twitter:description" content="CRM Viewer and organizer for Opportunities, Notifications and Tasks." />
  <meta name="twitter:image" content="favicon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="login-screen" class="login-screen hidden">
    <div class="login-card">
      <h1 class="login-title">Vanguard CRM board</h1>
      <p class="login-sub">Sign in with your OnlyOffice account at <strong>office.vanguardadj.com</strong>.</p>
      <form id="login-form">
        <label>
          Portal URL
          <input type="url" id="portal-url" value="https://office.vanguardadj.com" required />
        </label>
        <label>
          Username
          <input type="text" id="username" autocomplete="username" required />
        </label>
        <label>
          Password
          <input type="password" id="password" autocomplete="current-password" required />
        </label>
        <p id="login-error" class="error-text hidden"></p>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      </form>
    </div>
  </div>

  <div id="app" class="app hidden">
    <header class="hero">
      <div class="hero-inner">
        <div class="hero-copy">
          <p class="eyebrow">Vanguard · OnlyOffice CRM</p>
          <h1 class="hero-title">Opportunity <em>dashboard</em></h1>
          <p class="hero-desc">
            CRM Viewer and organizer for Opportunities, Notifications and Tasks.
          </p>
        </div>
        <div class="hero-actions">
          <button type="button" id="add-group-btn" class="btn btn-primary">Add group</button>
          <button type="button" id="refresh-btn" class="btn btn-secondary">Refresh all</button>
          <button type="button" id="logout-btn" class="btn btn-ghost">Sign out</button>
        </div>
      </div>
      <div class="hero-logo-wrap" aria-hidden="true">
        <img src="hero-ship-84.png" alt="" class="hero-logo" width="84" height="125" />
      </div>
    </header>

    <section class="global-meta">
      <span id="status-text">Ready</span>
      <span id="portal-label" class="portal-label"></span>
    </section>

    <div id="dashboard-tiles-pinned" class="dashboard-tiles-pinned hidden" aria-label="Pinned collapsed feed and tasks"></div>
    <div id="dashboard-panel-row" class="dashboard-panel-row" aria-label="CRM notifications and tasks"></div>
    <div id="dashboard-tiles" class="dashboard-tiles" aria-label="Dashboard tiles"></div>
  </div>

  <div id="toast" class="toast hidden" role="status"></div>

  <div id="confirm-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-title">
    <div class="modal-backdrop" data-confirm-dismiss></div>
    <div class="modal-card">
      <h2 id="confirm-modal-title" class="modal-title">Confirm</h2>
      <p id="confirm-modal-message" class="modal-message"></p>
      <div class="modal-actions">
        <button type="button" id="confirm-modal-cancel" class="btn btn-secondary">Cancel</button>
        <button type="button" id="confirm-modal-ok" class="btn btn-danger">Remove</button>
      </div>
    </div>
  </div>

  <div id="task-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="task-modal-title">
    <div class="modal-backdrop" data-task-modal-dismiss></div>
    <div class="modal-card modal-card-form">
      <h2 id="task-modal-title" class="modal-title">New task</h2>
      <form id="task-modal-form" class="modal-form">
        <div class="field">
          <label for="new-task-title">Title</label>
          <input type="text" id="new-task-title" name="title" required autocomplete="off" placeholder="Task title" />
        </div>
        <div class="field">
          <label for="new-task-description">Description</label>
          <textarea id="new-task-description" name="description" rows="3" placeholder="Optional details"></textarea>
        </div>
        <div class="field">
          <label for="new-task-deadline">Due date</label>
          <input type="date" id="new-task-deadline" name="deadLine" />
        </div>
        <div class="field">
          <label for="new-task-category">Category</label>
          <select id="new-task-category" name="categoryId" required></select>
        </div>
        <div class="field">
          <label for="new-task-responsible">Assigned to</label>
          <select id="new-task-responsible" name="responsibleId" required></select>
        </div>
        <div class="field opportunity-picker-field">
          <label for="new-task-opportunity-search">Opportunity</label>
          <input type="search" id="new-task-opportunity-search" placeholder="Search opportunity title…" autocomplete="off" />
          <div id="new-task-opportunity-results" class="contact-results hidden"></div>
          <div id="new-task-opportunity-selected" class="contact-selected"></div>
        </div>
        <label class="checkbox-filter modal-checkbox">
          <input type="checkbox" id="new-task-notify" name="notify" checked />
          <span>Notify assigned user</span>
        </label>
        <p id="task-modal-error" class="modal-error hidden" role="alert"></p>
        <div class="modal-actions">
          <button type="button" id="task-modal-cancel" class="btn btn-secondary">Cancel</button>
          <button type="submit" id="task-modal-submit" class="btn btn-primary">Create task</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
