services:
  dashboard:
    container_name: sietch-crm
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8766"
      COOKIE_SECURE: "true"
      DB_HOST: db
      DB_PORT: "5432"
      DOCS_INTERNAL_URL: http://docserver:8080
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - dashboard-data:/app/data
      - dashboard-uploads:/app/uploads
    ports:
      - "127.0.0.1:8766:8766"
    networks:
      - vanguard-internal

  db:
    image: postgres:16-alpine
    container_name: sietch-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - vanguard-internal

  docserver:
    image: onlyoffice/documentserver:latest
    container_name: sietch-docserver
    restart: unless-stopped
    environment:
      - JWT_SECRET=${DOCS_JWT_SECRET:-change_me_in_production}
      - REDIS_SERVER_HOST=redis
      - REDIS_SERVER_PORT=6379
    depends_on:
      - redis
    volumes:
      - docserver-data:/var/www/onlyoffice/Data
      - docserver-logs:/var/log/onlyoffice
    networks:
      - vanguard-internal

  redis:
    image: redis:7-alpine
    container_name: sietch-redis
    restart: unless-stopped
    networks:
      - vanguard-internal

volumes:
  dashboard-data:
  dashboard-uploads:
  db-data:
  docserver-data:
  docserver-logs:

networks:
  vanguard-internal:
    driver: bridge
