services:
  dashboard:
    container_name: sietch-crm
    build: .
    restart: on-failure:5
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8766/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    env_file:
      - .env
    environment:
      PORT: "8766"
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      DB_HOST: db
      DB_PORT: "5432"
      # DOCS_INTERNAL_URL is intentionally omitted here; set it in .env.
      # When the Document Server is on a separate droplet, set it to the public
      # URL (same as DOCS_PUBLIC_URL). When co-located in Docker, set the
      # container hostname/port (e.g., https://onlyoffice-docserver:443).
      CONTAINER_NAME: "sietch-crm"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - dashboard-data:/app/data
      - dashboard-uploads:/app/uploads
    ports:
      - "0.0.0.0:8766:8766"
    networks:
      - vanguard-internal

  db:
    image: docker.io/library/postgres:16-alpine
    container_name: sietch-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - vanguard-internal

  docserver:
    image: docker.io/onlyoffice/documentserver:latest
    container_name: onlyoffice-docserver
    restart: unless-stopped
    environment:
      - JWT_SECRET=${DOCS_JWT_SECRET:-change_me_in_production}
      - REDIS_SERVER_HOST=redis
      - REDIS_SERVER_PORT=6379
    depends_on:
      - redis
    volumes:
      - docserver-data:/var/www/onlyoffice/Data
      - docserver-logs:/var/log/onlyoffice
    ports:
      - "0.0.0.0:9443:443"
    networks:
      - vanguard-internal

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: sietch-redis
    restart: unless-stopped
    networks:
      - vanguard-internal

volumes:
  dashboard-data:
  dashboard-uploads:
  db-data:
  docserver-data:
  docserver-logs:

networks:
  vanguard-internal:
    driver: bridge
